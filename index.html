<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>每日功課 v5</title>
<meta name="theme-color" content="#7b6f63" />
<style>
:root{
  --bg:#f6f1ea;
  --card:#ffffff;
  --text:#2f2a25;
  --muted:#7a6f66;
  --main:#7b6f63;
  --main2:#a68f73;
  --ok:#5d9c73;
  --warn:#d29b48;
  --bad:#c96b62;
  --line:#e5ddd2;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Helvetica Neue",Arial,sans-serif;
  background:linear-gradient(180deg,#f7efe6 0%,#f6f1ea 45%,#efe7dc 100%);
  color:var(--text);
  padding:18px;
}
.app{
  max-width:560px;
  margin:0 auto;
  padding-bottom:40px;
}
.header{
  padding:18px 4px 10px;
}
h1{
  margin:0;
  font-size:28px;
  letter-spacing:.5px;
}
.sub{
  color:var(--muted);
  margin-top:6px;
  font-size:14px;
}
.card{
  background:rgba(255,255,255,.92);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin:12px 0;
  box-shadow:0 8px 20px rgba(70,50,30,.06);
}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.stat{
  background:#f3ece3;
  border-radius:14px;
  padding:12px;
}
.stat .num{
  font-size:24px;
  font-weight:800;
  margin-top:4px;
}
.stat .label{
  color:var(--muted);
  font-size:13px;
}
.task{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid var(--line);
  padding:13px 0;
}
.task:last-child{border-bottom:none}
.task-title{
  font-weight:700;
  font-size:16px;
}
.task-note{
  color:var(--muted);
  font-size:12px;
  margin-top:3px;
}
.btn{
  border:none;
  border-radius:999px;
  padding:10px 14px;
  min-width:86px;
  font-weight:700;
  background:#ded4c8;
  color:#4b4037;
}
.btn.done{
  background:var(--ok);
  color:#fff;
}
.progress-wrap{
  height:14px;
  background:#e8ded2;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--main2),var(--ok));
  border-radius:999px;
  transition:.25s;
}
label{
  display:block;
  margin:12px 0 6px;
  font-weight:700;
}
input,textarea,select{
  width:100%;
  border:1px solid var(--line);
  border-radius:12px;
  padding:11px;
  font-size:16px;
  background:#fffdfb;
  color:var(--text);
}
textarea{min-height:86px;resize:vertical}
.row{
  display:flex;
  gap:10px;
}
.row > *{flex:1}
.small{
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
}
.primary{
  width:100%;
  border:none;
  border-radius:14px;
  padding:13px;
  background:var(--main);
  color:white;
  font-weight:800;
  font-size:16px;
  margin-top:12px;
}
.secondary{
  width:100%;
  border:1px solid var(--line);
  border-radius:14px;
  padding:13px;
  background:#fff;
  color:var(--text);
  font-weight:800;
  font-size:16px;
  margin-top:10px;
}
.week{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:7px;
  margin-top:10px;
}
.day{
  background:#eee5da;
  border-radius:12px;
  padding:8px 4px;
  text-align:center;
  font-size:12px;
  min-height:54px;
}
.day strong{
  display:block;
  margin-bottom:4px;
}
.day.full{background:#cfe8d6}
.day.some{background:#f3dfb6}
.day.zero{background:#ead1cc}
.footer-note{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  margin-top:18px;
}
.pill{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#efe5d9;
  color:#5b4d42;
  font-size:12px;
  font-weight:700;
}
@media (display-mode: standalone){
  body{padding-top:calc(18px + env(safe-area-inset-top))}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="pill">v5｜手機桌面版</span>
    <h1>每日功課</h1>
    <div class="sub" id="todayText"></div>
  </div>

  <div class="card">
    <div class="grid2">
      <div class="stat">
        <div class="label">今日完成率</div>
        <div class="num" id="rate">0%</div>
      </div>
      <div class="stat">
        <div class="label">🔥 連續全完成</div>
        <div class="num"><span id="streak">0</span> 天</div>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress" id="progress"></div></div>
    <p class="small" id="dailyHint">今天先求有做，不求完美。</p>
  </div>

  <div class="card">
    <div class="task">
      <div>
        <div class="task-title">🏃 超慢跑</div>
        <div class="task-note">保底 15 分，狀態好 30 分</div>
      </div>
      <button class="btn" data-key="run">未完成</button>
    </div>
    <div class="task">
      <div>
        <div class="task-title">🧘 靜坐</div>
        <div class="task-note">保底 10 分，晚上可加長</div>
      </div>
      <button class="btn" data-key="meditation">未完成</button>
    </div>
    <div class="task">
      <div>
        <div class="task-title">🧹 環境整理</div>
        <div class="task-note">只整理一小角也算</div>
      </div>
      <button class="btn" data-key="clean">未完成</button>
    </div>
    <div class="task">
      <div>
        <div class="task-title">😴 睡眠節奏</div>
        <div class="task-note">不熬夜、睡前降速</div>
      </div>
      <button class="btn" data-key="sleep">未完成</button>
    </div>
  </div>

  <div class="card">
    <h3>今日狀態紀錄</h3>
    <div class="row">
      <div>
        <label>疲勞 1-10</label>
        <input id="fatigue" type="number" min="1" max="10" placeholder="例：6">
      </div>
      <div>
        <label>心情 1-10</label>
        <input id="mood" type="number" min="1" max="10" placeholder="例：7">
      </div>
    </div>
    <label>體重 kg</label>
    <input id="weight" type="number" step="0.1" placeholder="可不填">
    <label>今天一句話</label>
    <textarea id="note" placeholder="例：今天有點累，但有完成保底。"></textarea>
    <button class="primary" id="saveBtn">儲存今日紀錄</button>
  </div>

  <div class="card">
    <h3>本週狀態</h3>
    <div class="week" id="week"></div>
    <p class="small">綠色＝4項全完成；黃色＝有做一部分；紅色＝尚未打卡。</p>
  </div>

  <div class="card">
    <h3>資料備份</h3>
    <button class="secondary" id="exportBtn">匯出 JSON 備份</button>
    <button class="secondary" id="copyBtn">複製今日週報</button>
    <p class="small">資料存在這支手機的瀏覽器裡。換手機或清 Safari 資料會消失，所以偶爾匯出備份。</p>
  </div>

  <div class="footer-note">少做事，做對事，穩定就好。</div>
</div>

<script>
const TASKS = ["run","meditation","clean","sleep"];
const TASK_NAMES = {
  run:"超慢跑",
  meditation:"靜坐",
  clean:"環境整理",
  sleep:"睡眠節奏"
};

function localDateKey(date=new Date()){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
const today = localDateKey();
let allData = JSON.parse(localStorage.getItem("dailyPracticeV5") || "{}");
if(!allData[today]) allData[today] = {tasks:{}, fatigue:"", mood:"", weight:"", note:""};

function save(){
  localStorage.setItem("dailyPracticeV5", JSON.stringify(allData));
}
function dayData(key=today){
  if(!allData[key]) allData[key] = {tasks:{}, fatigue:"", mood:"", weight:"", note:""};
  if(!allData[key].tasks) allData[key].tasks = {};
  return allData[key];
}
function doneCount(key=today){
  const tasks = dayData(key).tasks;
  return TASKS.filter(t=>tasks[t]).length;
}
function fullDone(key=today){
  return doneCount(key) === TASKS.length;
}
function calcStreak(){
  let streak = 0;
  let d = new Date();
  for(let i=0;i<365;i++){
    const key = localDateKey(d);
    if(fullDone(key)){
      streak++;
      d.setDate(d.getDate()-1);
    }else{
      break;
    }
  }
  return streak;
}
function updateUI(){
  const d = dayData();
  document.getElementById("todayText").textContent = today;
  document.querySelectorAll(".btn[data-key]").forEach(btn=>{
    const key = btn.dataset.key;
    const isDone = !!d.tasks[key];
    btn.classList.toggle("done", isDone);
    btn.textContent = isDone ? "完成" : "未完成";
  });

  const count = doneCount();
  const rate = Math.round(count / TASKS.length * 100);
  document.getElementById("rate").textContent = rate + "%";
  document.getElementById("progress").style.width = rate + "%";
  document.getElementById("streak").textContent = calcStreak();

  const hints = [
    "今天先求有做，不求完美。",
    "完成一項也算把自己拉回來。",
    "身體穩，心才會穩。",
    "不要處理別人的情緒，先顧自己的節奏。",
    "全完成，今天很可以。"
  ];
  document.getElementById("dailyHint").textContent = hints[count];

  document.getElementById("fatigue").value = d.fatigue || "";
  document.getElementById("mood").value = d.mood || "";
  document.getElementById("weight").value = d.weight || "";
  document.getElementById("note").value = d.note || "";

  renderWeek();
}
function renderWeek(){
  const week = document.getElementById("week");
  week.innerHTML = "";
  const now = new Date();
  const day = now.getDay(); // 0 Sun
  const mondayOffset = day === 0 ? -6 : 1 - day;
  const start = new Date(now);
  start.setDate(now.getDate()+mondayOffset);

  for(let i=0;i<7;i++){
    const d = new Date(start);
    d.setDate(start.getDate()+i);
    const key = localDateKey(d);
    const c = doneCount(key);
    const el = document.createElement("div");
    el.className = "day " + (c===4 ? "full" : c>0 ? "some" : "zero");
    const names = ["一","二","三","四","五","六","日"];
    el.innerHTML = `<strong>${names[i]}</strong><div>${c}/4</div><small>${String(d.getMonth()+1)}/${d.getDate()}</small>`;
    week.appendChild(el);
  }
}
document.querySelectorAll(".btn[data-key]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const d = dayData();
    const key = btn.dataset.key;
    d.tasks[key] = !d.tasks[key];
    save();
    updateUI();
  });
});
document.getElementById("saveBtn").addEventListener("click",()=>{
  const d = dayData();
  d.fatigue = document.getElementById("fatigue").value;
  d.mood = document.getElementById("mood").value;
  d.weight = document.getElementById("weight").value;
  d.note = document.getElementById("note").value;
  save();
  alert("已儲存今天紀錄");
});
document.getElementById("exportBtn").addEventListener("click",()=>{
  const blob = new Blob([JSON.stringify(allData,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "daily-practice-v5-backup.json";
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("copyBtn").addEventListener("click",async()=>{
  const d = dayData();
  const doneList = TASKS.filter(t=>d.tasks[t]).map(t=>"✅ "+TASK_NAMES[t]).join("\n") || "尚未完成";
  const text = `每日功課週報 / ${today}
今日完成率：${Math.round(doneCount()/TASKS.length*100)}%
連續全完成：${calcStreak()}天

${doneList}

疲勞：${d.fatigue || "未填"}
心情：${d.mood || "未填"}
體重：${d.weight || "未填"}
一句話：${d.note || "未填"}`;
  try{
    await navigator.clipboard.writeText(text);
    alert("已複製今日週報");
  }catch(e){
    prompt("請手動複製：", text);
  }
});
updateUI();
</script>
</body>
</html>
